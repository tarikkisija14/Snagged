<div class="product-card">

  <div class="product-image-wrapper" (click)="onViewDetails()" style="cursor:pointer">
    <img
      [appLazyLoad]="getItemImage()"
      [alt]="item.title || 'Product image'"
      class="product-image"
      (error)="onImageError($event)"
    />

    <div class="product-badge" *ngIf="showBadge && item.condition">
      {{ item.condition }}
    </div>

    <div class="sold-overlay" *ngIf="item.isSold">
      <span>SOLD</span>
    </div>

    <div class="product-actions" *ngIf="showActions && !item.isSold">
      <button class="product-action-btn" title="Add to favorites" (click)="$event.stopPropagation()">
        <i class="far fa-heart"></i>
      </button>
    </div>
  </div>

  <div class="product-info">

    <span class="product-category" *ngIf="categoryName">
      {{ categoryName }}
    </span>

    <h3 class="product-title" (click)="onViewDetails()" style="cursor:pointer">
      {{ item.title }}
    </h3>

    <div class="product-price">
      ${{ item.price | number:'1.2-2' }}
    </div>

    <div class="product-footer">
      <button
        class="add-to-cart"
        (click)="onAddToCart()"
        [class.clicked]="addedToCart"
        [disabled]="item.isSold">
        <span>
          {{ item.isSold ? 'Sold Out' : (addedToCart ? '✓ Added!' : 'Add to Cart') }}
        </span>
      </button>
      <button
        class="view-details"
        *ngIf="showDetails"
        (click)="onViewDetails()">
        Details
      </button>
    </div>
  </div>
</div>
