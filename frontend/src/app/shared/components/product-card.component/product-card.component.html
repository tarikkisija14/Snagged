<div class="product-card">

  <div class="product-image-wrapper">
    <img
      [appLazyLoad]="getItemImage()"
      [alt]="item?.title || 'Product image'"
      class="product-image"
      [errorImage]="'https://placehold.co/400x600/e0e0e0/666?text=No+Image'"
    />


    <div class="product-badge" *ngIf="showBadge && item?.condition">
      {{ item.condition }}
    </div>


    <div class="product-actions" *ngIf="showActions">
      <button class="product-action-btn" title="Add to favorites">
        <i class="far fa-heart"></i>
      </button>
      <button class="product-action-btn" title="Quick view">
        <i class="fas fa-expand"></i>
      </button>
    </div>
  </div>


  <div class="product-info">

    <span class="product-category" *ngIf="item?.categoryId">
      Category
    </span>


    <h3 class="product-title">{{ item?.title }}</h3>


    <div class="product-price">
      ${{ item?.price | number:'1.2-2' }}
    </div>

    <div class="product-rating" *ngIf="showRating">
      <i class="fas fa-star"></i>
      <i class="fas fa-star"></i>
      <i class="fas fa-star"></i>
      <i class="fas fa-star"></i>
      <i class="far fa-star"></i>
      <span>({{ item?.likesCount || 0 }})</span>
    </div>

    <div class="product-footer">
      <button
        class="add-to-cart"
        (click)="onAddToCart()"
        [class.clicked]="addedToCart"
        [disabled]="item?.isSold">
        <span>
          {{ item?.isSold ? 'Sold Out' : (addedToCart ? '✓ Added!' : 'Add to Cart') }}
        </span>
      </button>
      <button
        class="view-details"
        *ngIf="showDetails"
        (click)="onViewDetails()">
        Details
      </button>
    </div>
  </div>
</div>
