<header class="header">
  <div class="container">

    <!-- logo -->
    <a href="/" class="logo">
      <h1 class="logo-text">Snagged</h1>
    </a>

    <!-- nav -->
    <nav class="nav">
      <a routerLink="/home" class="nav-link">Home</a>
      <a routerLink="/new-arrivals" class="nav-link">New Arrivals</a>
      <a routerLink="/shop" class="nav-link">Shop</a>
      <a routerLink="/sell" class="nav-link">Sell</a>
    </nav>

    <!-- actions -->
    <div class="header-actions">

      <!-- search -->
      <div class="search-wrapper">
        <input type="search" placeholder="Search for items..." class="search-bar">
        <svg class="search-icon" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"
                d="M21 21l-4.35-4.35m1.57-3.92a6.5 6.5 0 11-13 0 6.5 6.5 0 0113 0z" />
        </svg>
      </div>

      <!-- herat icon -->
      <button class="icon-btn">
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"
                d="M4.318 6.318a4.5 4.5 0 016.364 0L12 7.636l1.318-1.318a4.5 4.5 0 116.364 6.364L12 20.364l-7.682-7.682a4.5 4.5 0 010-6.364z" />
        </svg>
      </button>

      <!-- cart icon -->
      <button class="icon-btn cart-btn">
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"
                d="M3 3h2l.4 2M7 13h10l3-8H6.4M7 13L5.4 5M7 13l-1 5h12l-1-5M9 21a1 1 0 100-2 1 1 0 000 2zm8 0a1 1 0 100-2 1 1 0 000 2z" />
        </svg>
      </button>

      <!-- user icon -->
      <button class="icon-btn">
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"
                d="M15.75 6a3.75 3.75 0 11-7.5 0 3.75 3.75 0 017.5 0zM4.5 20.25a8.25 8.25 0 0115 0" />
        </svg>
      </button>

    </div>
  </div>
</header>
