<header class="header">
  <div class="container">

    <button
      mat-icon-button
      class="mobile-menu-btn"
      *ngIf="isMobile"
      [matMenuTriggerFor]="mobileMenu"
      aria-label="Open menu"
    >
      <mat-icon>menu</mat-icon>
    </button>

    <a routerLink="/" class="logo">
      <h1 class="logo-text">Snagged</h1>
    </a>

    <nav class="nav">
      <a routerLink="/shop" class="nav-link" routerLinkActive="active">Shop</a>
      <a routerLink="/new-arrivals" class="nav-link" routerLinkActive="active">New Arrivals</a>
      <a routerLink="/sell" class="nav-link" routerLinkActive="active">Sell</a>
    </nav>

    <div class="header-actions">

      <div class="search-wrapper">
        <input
          type="search"
          placeholder="Search for items..."
          class="search-bar"
        />
        <mat-icon class="search-icon">search</mat-icon>
      </div>

      <button
        class="icon-btn"
        aria-label="Wishlist"
      >
        <mat-icon>favorite_border</mat-icon>
      </button>

      <!-- Notification Bell -->
      <div class="notif-wrapper" *ngIf="authService.isLoggedIn()">
        <button class="icon-btn notif-btn" aria-label="Notifications" (click)="toggleNotifPanel()">
          <mat-icon>notifications_none</mat-icon>
          <span class="notif-badge" *ngIf="unreadCount > 0">
            {{ unreadCount > 9 ? '9+' : unreadCount }}
          </span>
        </button>

        <div class="notif-panel" *ngIf="showNotifPanel">
          <div class="notif-panel-header">
            <span class="notif-panel-title">Notifications</span>
            <button class="notif-mark-all" (click)="markAllRead()" *ngIf="unreadCount > 0">
              Mark all read
            </button>
          </div>
          <div class="notif-list" *ngIf="notifications.length > 0; else noNotifs">
            <div
              class="notif-item"
              *ngFor="let n of notifications"
              [class.unread]="!n.isRead"
              (click)="markAsRead(n, $event)"
            >
              <div class="notif-dot" *ngIf="!n.isRead"></div>
              <div class="notif-content">
                <p class="notif-message">{{ n.message }}</p>
                <span class="notif-time">{{ n.createdAt | date:'MMM d, h:mm a' }}</span>
              </div>
              <button class="notif-delete-btn" title="Delete" (click)="deleteNotification(n, $event)">
                <mat-icon>close</mat-icon>
              </button>
            </div>
          </div>
          <ng-template #noNotifs>
            <div class="notif-empty">No notifications</div>
          </ng-template>
        </div>
      </div>

      <button
        class="icon-btn cart-btn"
        aria-label="Cart"
        routerLink="/cart"
      >
        <mat-icon>shopping_cart</mat-icon>
      </button>

      <button
        type="button"
        class="icon-btn"
        aria-label="Account"
        (click)="onUserIconClick()"
      >
        <mat-icon>person_outline</mat-icon>
      </button>

    </div>
  </div>

  <mat-menu #mobileMenu="matMenu" class="mobileMenu">
    <button mat-menu-item routerLink="/shop">
      <mat-icon>storefront</mat-icon>
      <span>Shop</span>
    </button>

    <button mat-menu-item routerLink="/new-arrivals">
      <mat-icon>new_releases</mat-icon>
      <span>New Arrivals</span>
    </button>

    <button mat-menu-item routerLink="/sell">
      <mat-icon>sell</mat-icon>
      <span>Sell</span>
    </button>

  </mat-menu>
</header>
