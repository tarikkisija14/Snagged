<header class="header">
  <div class="container">

    <a routerLink="/" class="logo">
      <h1 class="logo-text">Snagged</h1>
    </a>

    <nav class="nav">
      <a routerLink="/shop" class="nav-link">Shop</a>
      <a routerLink="/new-arrivals" class="nav-link">New Arrivals</a>
      <a routerLink="/sell" class="nav-link">Sell</a>
    </nav>

    <div class="header-actions">

      <div class="search-wrapper">
        <input type="search" placeholder="Search for items..." class="search-bar" />
        <mat-icon class="search-icon">search</mat-icon>
      </div>

      <button class="icon-btn" aria-label="Wishlist">
        <mat-icon>favorite_border</mat-icon>
      </button>

      <button class="icon-btn cart-btn" aria-label="Cart" routerLink="/cart">
        <mat-icon>shopping_cart</mat-icon>
      </button>

      <button class="icon-btn" aria-label="Account" [routerLink]="['/home/auth/login']">
        <mat-icon>person_outline</mat-icon>
      </button>

      <button class="mobile-menu" aria-label="Menu">
        <mat-icon>menu</mat-icon>
      </button>

    </div>
  </div>
</header>
