<section class="hero-container" [class.is-mobile]="isHandset$ | async">
  <div class="hero">
    <div class="hero-content">
      <h1 class="hero-title">
        Rediscover style.<br>
        <span class="highlight">Reduce waste.</span>
      </h1>

      <div class="hero-subtitle">
        <p>One style. Every piece. Unlimited life.</p>
      </div>

      <div class="hero-actions" [class.stacked]="isHandset$ | async">
        <button mat-flat-button
                class="m3-pill-button primary"
                (click)="goToShop()">
          Shop Now
        </button>

        <button mat-flat-button
                class="m3-pill-button secondary">
          Sell Items
        </button>
      </div>
    </div>
  </div>
</section>

<app-catalog-list [mode]="'home'"></app-catalog-list>

<router-outlet></router-outlet>
