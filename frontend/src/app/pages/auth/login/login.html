<div class="login-content">
  <h1 class="welcome-title">Welcome Back</h1>
  <p class="welcome-subtitle">Login to your account to continue snagging</p>

  <form class="login-form" (ngSubmit)="login()">
  <div class="form-group">
      <label for="email" class="form-label">Email Address</label>
      <input
        type="email"
        id="email"
        class="form-input"
        placeholder="Enter your email"
        [(ngModel)]="email"
        name="email"
      />
    </div>

    <div class="form-group">
      <label for="password" class="form-label">Password</label>
      <input
        type="password"
        id="password"
        class="form-input"
        placeholder="Enter your password"
        [(ngModel)]="password"
        name="password"
      />
    </div>

    <div class="form-options">
      <label class="checkbox-container">
        <input type="checkbox" name="rememberMe" />
        <span class="checkbox-label">Remember me</span>
      </label>
      <a href="#" class="forgot-link">Forgot password?</a>
    </div>

    <button type="submit" class="lr-button">Login</button>

    <div class="divider">
      <span class="divider-text">Or login with</span>
    </div>

    <div class="social-buttons">
      <button type="button" class="social-button google-button">
        Google
      </button>

      <button type="button" class="social-button facebook-button">
        Facebook
      </button>
    </div>

    <p class="signup-text">
      Don't have an account?
      <a routerLink="/auth/register" class="signup-link">Sign up</a>
    </p>

  </form>
</div>
