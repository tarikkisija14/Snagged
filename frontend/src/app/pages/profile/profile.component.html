<section class="profile-page" *ngIf="!isLoading; else loading">

  <div class="profile-layout" *ngIf="profile; else noProfile">

    <mat-card class="profile-header-card">
      <div class="profile-header-content">

        <img
          class="avatar"
          [appLazyLoad]="profile.profileImageUrl || 'assets/default-avatar.png'"
          alt="Profile avatar"
        />

        <div class="profile-meta">
          <h1>{{ profile.username }}</h1>

          <mat-chip color="primary" selected>
            ⭐ {{ profile.averageRating }} ({{ profile.reviewCount }})
          </mat-chip>

          <p class="bio">
            {{ profile.bio || 'No bio yet.' }}
          </p>

          <div class="actions">
            <button mat-raised-button color="primary">
              Edit profile
            </button>
            <button mat-stroked-button color="warn" (click)="onLogout()">
              Logout
            </button>
          </div>
        </div>

      </div>
    </mat-card>

    <section class="items-section">
      <h2>My items ({{ items.length }})</h2>

      <div class="items-grid" *ngIf="items.length; else noItems">
        <app-product-card
          *ngFor="let item of items"
          [item]="item"
          [showActions]="false"
          [showRating]="false"
          [showDetails]="true"
          (addToCartClick)="onEditItem($event)"
          (viewDetailsClick)="onViewItem($event)">
        </app-product-card>
      </div>

      <ng-template #noItems>
        <div class="empty-state">
          <p>You haven't listed any items yet.</p>
          <button mat-raised-button color="primary">Add your first item</button>
        </div>
      </ng-template>
    </section>

  </div>
</section>

<ng-template #noProfile>
  <div class="center-state">
    <mat-card>
      <h2>Profile not ready</h2>
      <p>Please refresh or log in again.</p>

      <button mat-raised-button color="primary" (click)="ngOnInit()">
        Refresh
      </button>
    </mat-card>
  </div>
</ng-template>

<ng-template #loading>
  <div class="center-state">
    <mat-spinner diameter="40"></mat-spinner>
  </div>
</ng-template>
